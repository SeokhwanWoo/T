<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단 마스터: 우주 레이싱</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="space-background">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
    </div>
    
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 class="neon-text">🚀 구구단 마스터 🚀</h1>
            <p class="subtitle">15초 연료! 가장 멀리 날아가는 로켓이 되세요! (최대 9단)</p>
            
            <div class="customizer hologram-box">
                <h3>내 로켓 커스터마이징</h3>
                <div class="rocket-preview" id="rocket-preview">🚀</div>
                <div class="color-options">
                    <button class="color-btn" data-color="hue-rotate(0deg)" style="background: #e74c3c; border-color: #e74c3c;"></button>
                    <button class="color-btn" data-color="hue-rotate(120deg)" style="background: #2ecc71; border-color: #2ecc71;"></button>
                    <button class="color-btn" data-color="hue-rotate(240deg)" style="background: #3498db; border-color: #3498db;"></button>
                    <button class="color-btn" data-color="hue-rotate(280deg)" style="background: #9b59b6; border-color: #9b59b6;"></button>
                    <button class="color-btn" data-color="hue-rotate(60deg)" style="background: #f1c40f; border-color: #f1c40f;"></button>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto;">
                <button id="start-btn" class="btn primary-btn neon-btn">게임 시작!</button>
                <button id="view-ranking-btn" class="btn secondary-btn neon-btn">🏆 랭킹 보기</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="hud">
                <div class="fuel-container">
                    <div class="fuel-label">연료 <span id="time-left-text">15.0</span>s</div>
                    <div class="fuel-bar-bg">
                        <div id="fuel-bar" class="fuel-bar-fill"></div>
                    </div>
                </div>
                <div class="stats-container">
                    <div class="combo" id="combo-display">콤보: x0</div>
                    <div class="score">점수: <span id="score">0</span></div>
                </div>
            </div>
            
            <div class="racing-track" id="racing-track">
                <!-- Opponent rockets will be injected here -->
                <div class="player-rocket" id="player-rocket">
                    <span id="player-rocket-emoji">🚀</span>
                    <div class="booster" id="player-booster"></div>
                </div>
            </div>
            
            <div class="hologram-board">
                <div id="question" class="question">2 × 3 = ?</div>
                
                <div class="options-container">
                    <button class="option-btn hologram-btn">1</button>
                    <button class="option-btn hologram-btn">2</button>
                    <button class="option-btn hologram-btn">3</button>
                    <button class="option-btn hologram-btn">4</button>
                </div>
            </div>
            
            <div id="feedback" class="feedback"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2 class="neon-text text-danger">연료 소진! ⛽</h2>
            <div class="final-score hologram-box">최종 비행 점수: <span id="final-score">0</span>점</div>
            <div id="rating" class="rating neon-text">대단해요! 🌟</div>
            
            <div class="ranking-container hologram-box">
                <h3 class="neon-text">🏆 실시간 랭킹 (Top 5) 🏆</h3>
                <ul id="ranking-list" class="ranking-list">
                    <!-- 랭킹 항목이 여기에 추가됩니다 -->
                </ul>
            </div>

            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                <button id="restart-btn" class="btn primary-btn neon-btn">다시 비행하기</button>
                <button id="go-home-btn" class="btn secondary-btn neon-btn">처음으로</button>
            </div>
        </div>

        <!-- Ranking Screen -->
        <div id="ranking-screen" class="screen">
            <h2 class="neon-text">🏆 명예의 전당 🏆</h2>
            <div class="ranking-container hologram-box">
                <ul id="main-ranking-list" class="ranking-list">
                    <!-- 랭킹 항목이 여기에 추가됩니다 -->
                </ul>
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                <button id="back-to-start-btn" class="btn primary-btn neon-btn">처음으로 돌아가기</button>
                <button id="reset-ranking-btn" class="btn danger-btn neon-btn">랭킹 초기화</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
