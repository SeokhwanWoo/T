<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페이스 레이드 대작전 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 class="neon-text title-glow">스페이스 레이드 🚀</h1>
            <p class="subtitle">WASD로 이동하고 적을 처치해 레벨업하세요!</p>
            
            <div class="customizer hologram-box">
                <h3>내 캐릭터 & 색상 커스터마이징</h3>
                <div style="display: flex; justify-content: center; margin-bottom: 0.5rem;">
                    <!-- Player Customizer -->
                    <div>
                        <div class="rocket-preview" id="rocket-preview">🛸</div>
                        <div class="char-options" style="display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <button class="char-btn active" data-char="🛸">🛸</button>
                            <button class="char-btn" data-char="🚀">🚀</button>
                            <button class="char-btn" data-char="🧑‍🚀">🧑‍🚀</button>
                            <button class="char-btn" data-char="🤖">🤖</button>
                        </div>
                        <div class="color-options">
                            <button class="color-btn" data-color="hue-rotate(0deg)" style="background: #e74c3c; border-color: #e74c3c;"></button>
                            <button class="color-btn" data-color="hue-rotate(120deg)" style="background: #2ecc71; border-color: #2ecc71;"></button>
                            <button class="color-btn" data-color="hue-rotate(240deg)" style="background: #3498db; border-color: #3498db;"></button>
                            <button class="color-btn" data-color="hue-rotate(280deg)" style="background: #9b59b6; border-color: #9b59b6;"></button>
                            <button class="color-btn" data-color="hue-rotate(60deg)" style="background: #f1c40f; border-color: #f1c40f;"></button>
                        </div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto;">
                <button id="start-btn" class="btn primary-btn neon-btn">전투 시작!</button>
                <button id="view-ranking-btn" class="btn secondary-btn neon-btn">명예의 전당</button>
            </div>
        </div>

        <!-- Level Up Screen (Overlay) -->
        <div id="level-up-screen" class="screen" style="z-index: 1000; background: rgba(0,0,0,0.8); display: none;">
            <h2 class="neon-text" style="font-size: 2.5rem; text-align: center; margin-bottom: 1rem; margin-top: 2rem;">LEVEL UP!</h2>
            <p style="text-align: center; color: #fff; margin-bottom: 2rem;">보급품을 선택하세요!</p>
            <div id="upgrade-cards" class="upgrade-cards-container">
                <!-- Cards generated via JS -->
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Top HUD: EXP and Level -->
            <div class="top-hud">
                <div class="exp-container">
                    <div class="level-text">Lv. <span id="player-level">1</span></div>
                    <div class="exp-bar-bg">
                        <div class="exp-bar-fill" id="exp-bar"></div>
                    </div>
                </div>
                <!-- Boss HP (Hidden by default) -->
                <div class="boss-hp-container" id="boss-hp-container" style="display: none; margin-top: 0.5rem;">
                    <div class="boss-name" id="boss-name-text">알 수 없는 보스 개체</div>
                    <div class="hp-bar-bg">
                        <div class="hp-bar-fill" id="boss-hp-bar"></div>
                    </div>
                </div>
            </div>
            
            <!-- Battle Arena -->
            <div class="battle-arena" id="battle-arena">
                <!-- Player -->
                <div class="player-container" id="player-container">
                    <span class="ship-emoji" id="player-rocket-emoji">🛸</span>
                </div>
                <!-- Entities will be spawned here by JS -->
            </div>
            
            <!-- Bottom HUD -->
            <div class="bottom-hud">
                <div class="status-hud">
                    <div class="score-container" style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="color: #fff; font-size: 1.2rem;">Score: <span id="score" class="score">0</span></span>
                        <span style="color: #e74c3c; font-size: 1.2rem;">HP: <span id="player-hp-text">100</span></span>
                    </div>
                    
                    <div class="ult-label" style="color: #f1c40f; font-size: 1rem; display: flex; justify-content: space-between;">
                        <span>Ultimate (Shift)</span>
                        <span id="ult-ready-text" style="display: none; font-weight: bold; animation: pulse 1s infinite;">READY!</span>
                    </div>
                    <div class="ult-bar-bg" style="width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; border: 1px solid #f1c40f;">
                        <div class="ult-bar-fill" id="ult-bar" style="height: 100%; width: 0%; background: linear-gradient(90deg, #f39c12, #f1c40f); transition: width 0.1s linear;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Floating Feedback Overlay -->
            <div id="feedback" class="feedback"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2 id="result-title" class="neon-text">GAME OVER</h2>
            <div class="hologram-box">
                <p>최종 스코어</p>
                <div class="final-score" id="final-score">0</div>
                <p id="rating" class="rating">훌륭한 전투였습니다!</p>
            </div>
            <div style="display: flex; gap: 1rem; flex-direction: column;">
                <button id="restart-btn" class="btn primary-btn neon-btn">다시 도전</button>
                <button id="go-home-btn" class="btn secondary-btn neon-btn">처음으로</button>
            </div>
        </div>

        <!-- Ranking Screen -->
        <div id="ranking-screen" class="screen">
            <h2 class="neon-text" style="text-align: center; margin-bottom: 1.5rem;">명예의 전당 🏆</h2>
            <div class="hologram-box" style="flex: 1; overflow-y: auto;">
                <ul id="ranking-list" class="ranking-list">
                    <!-- Rankings injected by JS -->
                </ul>
            </div>
            <button id="reset-ranking-btn" class="btn danger-btn neon-btn" style="margin-bottom: 1rem;">기록 초기화</button>
            <button id="back-to-start-btn" class="btn secondary-btn neon-btn">돌아가기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
